services:
  postgres:
    image: postgres:16
    container_name: emoji-postgres
    environment:
      POSTGRES_DB: emoji
      POSTGRES_USER: emoji
      POSTGRES_PASSWORD: emoji
    ports:
      - "${HOST_DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: emoji-redis
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
